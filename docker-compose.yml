services:
  ollama:
    image: ollama/ollama:latest
    container_name: idiscovr-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build: .
    container_name: idiscovr-app
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - ./wav2lip-onnx-256/checkpoints:/app/wav2lip-onnx-256/checkpoints
      - ./idle_loops:/app/idle_loops
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data: